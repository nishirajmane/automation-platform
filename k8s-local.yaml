apiVersion: apps/v1
kind: Deployment
metadata:
  name: automation-api
  labels:
    app: automation-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: automation-api
  template:
    metadata:
      labels:
        app: automation-api
    spec:
      containers:
      - name: api
        image: automation-api:local
        imagePullPolicy: Never # Crucial for local Docker images!
        ports:
        - containerPort: 4000
        env:
        - name: NODE_ENV
          value: "development"
        - name: DATABASE_URL
          value: "postgresql://postgres:postgres@host.docker.internal:5432/automation_db"
        - name: REDIS_URL
          value: "redis://host.docker.internal:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: automation-api
spec:
  type: NodePort
  selector:
    app: automation-api
  ports:
  - port: 4000
    targetPort: 4000
    nodePort: 30040
