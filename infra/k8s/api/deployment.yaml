apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: ai-marketplace
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          # TODO: Replace with your actual registry image
          image: ghcr.io/ORG/ai-marketplace-api:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: ai-marketplace-config
            - secretRef:
                name: ai-marketplace-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
