apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: ai-marketplace
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          # TODO: Replace with your actual registry image
          image: ghcr.io/ORG/ai-marketplace-web:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: ai-marketplace-config
            - secretRef:
                name: ai-marketplace-secrets
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "http://api:4000"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
