# ─────────────────────────────────────────────────────
# EXAMPLE ONLY — Do NOT commit real secrets to Git.
#
# Create real secrets using:
#   kubectl create secret generic ai-marketplace-secrets \
#     --namespace=ai-marketplace \
#     --from-literal=DATABASE_URL='postgresql://...' \
#     --from-literal=REDIS_URL='redis://...' \
#     --from-literal=JWT_SECRET='your-secret'
#
# Or use a cloud secrets manager (e.g. DigitalOcean, AWS SM, Vault).
# ─────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: ai-marketplace-secrets
  namespace: ai-marketplace
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/ai_marketplace?schema=public"
  REDIS_URL: "redis://redis:6379"
  JWT_SECRET: "change-me-to-a-long-random-string"
