name: Deploy to Server

# Triggered after Docker images are successfully built & pushed
on:
  workflow_run:
    workflows: ["Build & Push Docker Images"]
    types: [completed]
    branches: [main]
  # Also allow manual trigger
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── SSH into the server and deploy ────────────────────
      # Required GitHub Secrets:
      #   SSH_PRIVATE_KEY  — private key for server access
      #   SERVER_HOST      — e.g. 74.125.151.162
      #   SERVER_USER      — e.g. ubuntu
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/automation-platform

            # Pull latest code
            git pull origin main

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new images (built by build.yml)
            docker compose -f docker-compose.prod.yml pull web api runtime-worker

            # Restart services with zero-downtime rolling update
            docker compose -f docker-compose.prod.yml up -d --no-build

            # Clean up old/dangling images
            docker image prune -f

            echo "✅ Deployment complete"

      - name: Verify deployment health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Wait for containers to be healthy
            sleep 10
            docker compose -f ~/automation-platform/docker-compose.prod.yml ps
            curl -sf http://localhost/nginx-health || (echo "❌ Nginx unhealthy" && exit 1)
            curl -sf http://localhost/api/health   || (echo "❌ API unhealthy" && exit 1)
            echo "✅ All health checks passed"
