name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["CI — Lint, Test, Build"]
    types: [completed]
    branches: [main]

# Only run if CI passed
jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - app: web
            dockerfile: infra/docker/web.Dockerfile
            image: ai-marketplace-web
          - app: api
            dockerfile: infra/docker/api.Dockerfile
            image: ai-marketplace-api
          - app: runtime-worker
            dockerfile: infra/docker/runtime-worker.Dockerfile
            image: ai-marketplace-runtime-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # TODO: Replace with your container registry credentials
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
