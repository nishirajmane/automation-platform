version: '3.8'

# ─────────────────────────────────────────────────────────────
# Production Docker Compose — AI Marketplace
#
# Usage (local build):     docker compose -f docker-compose.prod.yml up -d --build
# Usage (CI/CD pull):      docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d
#
# All services communicate over the internal "app-network".
# Only Nginx is exposed externally on port 80.
# ─────────────────────────────────────────────────────────────

x-common-env: &common-env
  env_file: .env.production

services:
  # ── Infrastructure ────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_marketplace
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application Services ──────────────────────────────────
  api:
    # CI/CD: replace 'build' with 'image: ghcr.io/YOUR_ORG/ai-marketplace-api:latest'
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    image: ai-marketplace-api:latest
    restart: unless-stopped
    <<: *common-env
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  runtime-worker:
    # CI/CD: replace 'build' with 'image: ghcr.io/YOUR_ORG/ai-marketplace-runtime-worker:latest'
    build:
      context: .
      dockerfile: infra/docker/runtime-worker.Dockerfile
    image: ai-marketplace-runtime-worker:latest
    restart: unless-stopped
    <<: *common-env
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    # CI/CD: replace 'build' with 'image: ghcr.io/YOUR_ORG/ai-marketplace-web:latest'
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    image: ai-marketplace-web:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: http://74.125.151.162/api
    networks:
      - app-network
    depends_on:
      api:
        condition: service_healthy

  # ── Reverse Proxy ─────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    depends_on:
      - web
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/nginx-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

# ── Volumes ───────────────────────────────────────────────────
volumes:
  pgdata:
  redisdata:

# ── Networks ──────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge
